    <header>
        <div id="sideMenu" class="side-menu">
            <a href="accueil.html">Accueil</a>
            <a href="cours.html">Cours</a>

            </ul>
        </nav>
    </header>

    <section class="contact-container">

        <div class="contact-card">

            <h1>Contactez-nous</h1>

            <p class="subtitle">
                Envoyez un message à un professeur ou à l'administration
            </p>

            <form id="contactForm">

                <label>Destinataire</label>
                <input type="email" id="destinataire" placeholder="Email du destinataire" required>

                <label>Objet</label>
                <input type="text" id="objet" placeholder="Objet du message" required>

                <label>Message</label>
                <textarea placeholder="Votre message..." required></textarea>

                <button type="submit">Envoyer le message</button>

            </form>

        </div>

    </section>

    <div id="overlay" class="overlay"></div>

    <footer>

        <a href="apropos.html" class="footer-about">À propos</a>

        <p>© 2026 Efrei – Tous droits réservés</p>

        <div class="socials">

            <a href="https://www.instagram.com/efrei_paris/" target="_blank">
