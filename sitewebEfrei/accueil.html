<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accueil</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <header>
        <div id="sideMenu" class="side-menu">
            <a href="accueil.html">Accueil</a>
            <a href="cours.html">Cours</a>
            <a href="equipe.html">Équipe</a>
            <a href="contact.html">Contact</a>
        </div>

        <div class="logo">
            <a href="https://www.efrei.fr" target="_blank">
                <img src="../images/logo.png" alt="Logo">
            </a>
        </div>

        <nav>
            <ul>
                <li><a href="accueil.html">Accueil</a></li>
                <li><a href="cours.html">Cours</a></li>
                <li><a href="equipe.html">Équipe</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li class="menu-icon">☰</li>
            </ul>
        </nav>
    </header>

    <main>

    <section class="hero">
        <h1>Bienvenue au Département Informatique</h1>

        <div class="carousel">
            <button class="prev">&#10094;</button>

            <div class="slides">
                <img src="../images/slide1.jpg">
                <img src="../images/slide2.webp">
                <img src="../images/slide3.jpg">
            </div>
            
            <div class="dots"></div>

            <button class="next">&#10095;</button>
        </div>
    </section>

    <section class="cards">
        <div class="card">
            <h3>Présentation</h3>
            <p>Découvrez notre département</p>
            <button class="open-popup" data-title="Présentation" data-text="Le département informatique de l'EFREI forme des experts en développement, réseaux, cybersécurité et intelligence artificielle. Les étudiants bénéficient d'un enseignement pratique et de projets concrets.">Lire plus</button>
        </div>

        <div class="card">
            <h3>Nos Formations</h3>
            <p>Voir les programmes</p>
            <button class="open-popup" data-title="Nos Formations" data-text="Nous proposons des formations en programmation web, bases de données, réseaux, systèmes embarqués et intelligence artificielle. Chaque formation inclut des projets pratiques et du travail en équipe.">Voir</button>
        </div>

        <div class="card">
            <h3>Actualités</h3>
            <p>Dernières infos</p>
            <button class="open-popup" data-title="Actualités" data-text="Découvrez les dernières actualités du département : hackathons, conférences, nouveaux projets étudiants et partenariats avec des entreprises technologiques.">Consulter</button>
        </div>
    </section>

    </main>

    <div id="popup" class="popup">
        <div class="popup-content">
            <span class="close">&times;</span>
            <h2 id="popup-title"></h2>
            <p id="popup-text"></p>
        </div>
    </div>

    <div id="overlay" class="overlay"></div>
    
    <footer>
        <p>© 2026 Efrei – Tous droits réservés</p>

        <div class="socials">
        <a href="https://www.youtube.com/efrei" target="_blank">
            <img src="../images/youtube.png" alt="YouTube">
        </a>

        <a href="https://www.instagram.com/efrei_paris/" target="_blank">
            <img src="../images/instagram.png" alt="Instagram">
        </a>
    </div>
        
    </footer>

    <script src="../js/script.js"></script>
    
</body>
</html>
